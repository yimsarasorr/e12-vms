<ion-header class="ion-no-border" [translucent]="false">
  <ion-toolbar class="bg-white border-b border-gray-200 shadow-none">
    <ion-title class="font-bold text-gray-900 text-xl text-center">โปรไฟล์</ion-title>
    <ion-buttons slot="end">
      <ion-button style="--color: #111827;">
        <ion-icon name="log-out-outline" class="text-xl"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <!-- Profile Card -->
  <div class="px-4 pt-6 pb-4">
    <div class="bg-white border border-gray-300 rounded-xl p-4 shadow-sm">
      <div class="flex items-center">
        <ion-avatar class="w-[60px] h-[60px] mr-4 border border-gray-300 bg-gray-100 flex items-center justify-center">
          <img *ngIf="userProfile.avatar; else noAvatar" [src]="userProfile.avatar" alt="Avatar"
            class="w-full h-full object-cover" />
          <ng-template #noAvatar>
            <ion-icon name="person" class="text-3xl text-gray-400"></ion-icon>
          </ng-template>
        </ion-avatar>
        <div class="flex-1">
          <h2 class="m-0 text-lg font-bold text-[#0056b3]">{{ userProfile.name || 'ผู้เยี่ยมชม' }}</h2>
          <!-- Role Badge -->
          <div class="mt-1 mb-1" *ngIf="userProfile.role">
            <span
              class="bg-yellow-100 text-yellow-800 text-xs font-semibold px-2 py-0.5 rounded border border-yellow-200">
              {{ userProfile.role }}
            </span>
          </div>
          <p class="mb-1 text-sm text-[#666]">เบอร์โทร: {{ userProfile.phone || '-' }}</p>
          <div class="flex items-center text-xs text-[#666] cursor-pointer active:opacity-70 transition-opacity"
            (click)="openEditProfile()">
            <span>แก้ไขข้อมูลส่วนตัว</span>
            <ion-icon name="arrow-forward-outline" class="ml-1 text-sm"></ion-icon>
          </div>
        </div>
      </div>

      <!-- LINE Connection Section -->
      <div class="mt-4 pt-3 border-t border-gray-100 flex justify-between items-center">
        <div class="flex items-center gap-4">
          <div class="flex flex-col">
            <span class="text-[10px] text-gray-400 uppercase font-bold">LINE Status</span>
            <div *ngIf="userProfile.lineId" class="flex items-center gap-1 text-green-700 text-xs font-bold">
              <ion-icon name="checkmark-circle"></ion-icon> เชื่อมต่อแล้ว
            </div>
            <div *ngIf="!userProfile.lineId" class="text-xs text-gray-400">ยังไม่เชื่อมต่อ</div>
          </div>

          <div *ngIf="userProfile.role === 'Host'" class="border-l border-gray-200 pl-4">
            <ion-button (click)="openInviteModal()" size="small" fill="solid" color="primary" class="h-8 text-xs font-bold shadow-sm">
              <ion-icon name="person-add-outline" slot="start"></ion-icon>
              เชิญผู้ติดต่อ
            </ion-button>
          </div>

          <!-- DevTool: Switch Role -->
          <div class="border-l border-gray-200 pl-4">
            <ion-button (click)="openSwitchMenu()" size="small" fill="outline" color="medium" class="h-8 text-xs font-bold">
              <ion-icon name="options-outline" slot="start"></ion-icon>
              สลับสิทธิ์
            </ion-button>
          </div>
        </div>

        <div *ngIf="!userProfile.lineId">
          <ion-button size="small" fill="outline" color="success" class="h-8 text-xs font-bold">
            เชื่อมต่อ LINE
          </ion-button>
        </div>
      </div>

    </div>
  </div>

  <div class="bg-white">
    <div class="px-4 pb-24">
      <h3 class="text-base font-semibold mb-3 mt-2 text-[#666] pl-1">การตั้งค่าทั่วไป</h3>
      <ion-list class="bg-white rounded-2xl p-0 overflow-hidden shadow-sm border border-gray-100">
        <ion-item button detail lines="full" *ngFor="let item of generalSettings"
          class="[--padding-start:16px] [--inner-padding-end:16px] [--min-height:56px] last:[--border-width:0]">
          <div class="mr-3 flex items-center justify-center w-8 h-8 bg-[#f5f8ff] rounded-lg" slot="start">
            <ion-icon [name]="item.icon" class="text-lg text-[#1a73e8]"></ion-icon>
          </div>
          <ion-label class="font-medium text-[#333]">{{ item.title }}</ion-label>
        </ion-item>
      </ion-list>

      <h3 class="text-base font-semibold mb-3 mt-6 text-[#666] pl-1">อื่นๆ</h3>
      <ion-list class="bg-white rounded-2xl p-0 overflow-hidden shadow-sm border border-gray-100">
        <ion-item button detail lines="full" *ngFor="let item of otherSettings"
          class="[--padding-start:16px] [--inner-padding-end:16px] [--min-height:56px] last:[--border-width:0]">
          <div class="mr-3 flex items-center justify-center w-8 h-8 bg-[#f5f8ff] rounded-lg" slot="start">
            <ion-icon [name]="item.icon" class="text-lg text-[#1a73e8]"></ion-icon>
          </div>
          <ion-label class="font-medium text-[#333]">{{ item.title }}</ion-label>
          <ion-note slot="end" *ngIf="item.value" class="text-sm">{{ item.value }}</ion-note>
        </ion-item>
      </ion-list>
    </div>
  </div>

</ion-content>
