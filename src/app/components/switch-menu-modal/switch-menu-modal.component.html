<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title class="text-base font-bold">Switch Role (DevTool)</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()" fill="clear" color="medium">
        <ion-icon name="close-outline" class="text-xl"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <p class="text-xs text-gray-400 text-center mb-3">
    เลือก Role เพื่อทดสอบสิทธิ์การใช้งาน — DB และ LINE Rich Menu จะเปลี่ยนหลังจากกด Role ที่เลือก
  </p>

  <div class="space-y-2">
    <div
      *ngFor="let option of roles"
      (click)="switchRole(option)"
      class="flex items-center gap-3 p-3 rounded-xl border-2 cursor-pointer transition-all"
      [class.border-gray-100]="activeLevel !== option.level"
      [class.bg-gray-50]="activeLevel !== option.level"
      [class.border-[#1a73e8]]="activeLevel === option.level"
      [class.bg-blue-50]="activeLevel === option.level"
      [class.opacity-50]="isLoading && activeLevel !== option.level">

      <!-- Icon Badge -->
      <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0"
        [style.background-color]="option.color + '22'">
        <ion-icon [name]="option.icon" class="text-xl" [style.color]="option.color"></ion-icon>
      </div>

      <!-- Info -->
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2">
          <span class="font-bold text-sm text-gray-800">{{ option.label }}</span>
          <span class="text-xs font-mono text-gray-400">Lv.{{ option.level }}</span>
        </div>
        <p class="text-xs text-gray-500 mt-0.5">{{ option.description }}</p>
      </div>

      <!-- Active / Loading indicator -->
      <div class="flex-shrink-0">
        <ion-spinner *ngIf="isLoading && activeLevel !== option.level" name="crescent" class="text-sm"></ion-spinner>
        <ion-icon
          *ngIf="activeLevel === option.level"
          name="checkmark-circle"
          class="text-2xl"
          [style.color]="option.color">
        </ion-icon>
      </div>
    </div>
  </div>
</ion-content>
