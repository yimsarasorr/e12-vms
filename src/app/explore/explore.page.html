<ion-content [scrollY]="false" style="--background: black;">
  <div class="main-content-container" [class.scale-down]="isModalOpen">
    <div id="map" style="width: 100%; height: 100%; position: absolute; z-index: 1;"></div>

    <!-- Top Container: Search -->
    <div class="absolute top-4 left-0 right-0 z-[20] flex flex-col items-center px-4 pt-safe-top gap-3">

      <!-- Google Style Search Bar -->
      <div class="rounded-full flex items-center w-full max-w-sm px-4 py-3 transition-all duration-300" [ngClass]="{
             'bg-blue-50/80 border-2 border-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.3)]': isSearching,
             'bg-white shadow-md border border-gray-100': !isSearching
           }">
        <ion-icon name="navigate-outline" class="text-xl mr-3 transition-colors duration-300"
          [ngClass]="isSearching ? 'text-blue-500 animate-pulse' : 'text-[#1a73e8]'"></ion-icon>
        <input type="text" [(ngModel)]="searchQuery" (input)="onSearch()" placeholder="ค้นหา ที่นี่"
          class="flex-1 bg-transparent border-none outline-none text-base text-gray-700 placeholder-gray-400 font-medium transition-colors"
          [ngClass]="{'text-blue-700 placeholder-blue-300': isSearching}">

        <div class="flex items-center border-l pl-3 ml-2 transition-colors duration-300"
          [ngClass]="isSearching ? 'border-blue-200' : 'border-gray-200'">
          <div
            class="w-8 h-8 rounded-full overflow-hidden border border-gray-200 bg-gray-100 flex items-center justify-center">
            <!-- Profile avatar from user data -->
            <img *ngIf="userProfile?.avatar" [src]="userProfile?.avatar" alt="User" class="w-full h-full object-cover">
            <!-- Default gray user icon -->
            <ion-icon *ngIf="!userProfile?.avatar" name="person" class="text-gray-400 text-xl"></ion-icon>
          </div>
        </div>
      </div>

    </div>

    <div class="fab-container" style="position: absolute; bottom: 40%; right: 16px; z-index: 2;">
      <ion-fab-button color="light" (click)="focusOnUser()">
        <ion-icon name="locate"></ion-icon>
      </ion-fab-button>
    </div>

    <div class="bottom-sheet" [style.height.px]="currentSheetHeight" [class.snapping]="isSnapping" style="z-index: 10;"
      (mousedown)="startDrag($event)" (touchstart)="startDrag($event)">
      <div class="drag-header">
        <div class="drag-line"></div>
      </div>

      <div class="sheet-content" #sheetContent [class.lock-scroll]="!canScroll">
        <div class="sticky-header">
          <div class="px-3 pt-2 pb-1">
            <ion-button (click)="openRegisterCodeModal()" expand="block" fill="outline" color="primary"
              class="h-10 text-sm font-bold" style="--border-radius: 8px; margin: 0;">
              <ion-icon name="key-outline" slot="start"></ion-icon>
              มีรหัสคำเชิญ? ลงทะเบียนเข้าอาคาร
            </ion-button>
          </div>
        </div>

        <div class="lot-list">
          <div *ngIf="filteredParkingLots.length === 0" class="empty-state"
            style="text-align: center; padding: 40px 20px; color: #6b7280;">
            <ion-icon name="business-outline" style="font-size: 48px; margin-bottom: 10px; opacity: 0.5;"></ion-icon>
            <p>ไม่พบข้อมูลอาคาร</p>
          </div>

          <ng-container>
            <div *ngFor="let building of filteredParkingLots; let i = index"
              class="lot-card bg-white rounded-xl p-4 mb-3 shadow-[0_2px_8px_rgba(0,0,0,0.08)] border border-gray-100 relative overflow-hidden cursor-pointer"
              [style.border-left]="'6px solid ' + (building.distanceColor || '#1a73e8')"
              (click)="viewLotDetails(building)">

              <div class="flex flex-row gap-4">
                <!-- Left Column: Icon/Status -->
                <div
                  class="flex flex-col items-center justify-center min-w-[70px] text-center border-r border-gray-100 pr-3">
                  <div class="rounded-full w-12 h-12 flex items-center justify-center bg-blue-50 text-[#1a73e8] mb-1">
                    <ion-icon name="business" class="text-2xl"></ion-icon>
                  </div>
                </div>

                <!-- Content Frame -->
                <div class="flex-1 flex flex-col justify-center pt-0.5 relative">
                  <!-- Title Row -->
                  <div class="flex items-start gap-2 mb-1 pr-6 w-full">
                    <div class="text-base font-bold text-gray-800 leading-tight break-words whitespace-normal w-full">
                      {{ building.name }}
                    </div>
                  </div>

                  <!-- Zone -->
                  <div class="flex items-start gap-1.5 text-xs text-gray-600 mb-2">
                    <ion-icon name="location-outline" class="text-gray-400 text-sm mt-[2px] shrink-0"></ion-icon>
                    <span class="whitespace-normal leading-relaxed text-[11px]">ห่าง {{ building.distance | number:'1.0-0' }} ม.</span>
                  </div>

                  <!-- Type Badge and Details -->
                  <div class="flex flex-row gap-2">
                    <span class="px-2 py-1 text-[10px] rounded-full font-bold bg-blue-50 text-[#1a73e8]">
                      อาคาร
                    </span>
                    <span class="px-2 py-1 text-[10px] rounded-full font-bold bg-gray-100 text-gray-600">
                      {{ (building.floors?.length || 0) }} ชั้น
                    </span>
                  </div>
                </div>
              </div>
            </div>
          </ng-container>

        </div>

      </div>
    </div>
  </div>
</ion-content>
